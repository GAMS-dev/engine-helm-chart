{{- $annotations := dict }}

{{- if .Values.broker.apiVersion2.service.annotations }}
{{- $svc := include "common.tplvalues.render" (dict "value" .Values.broker.apiVersion2.service.annotations "context" $) | fromYaml }}
{{- $annotations = merge $annotations $svc }}
{{- end }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gams-engine.prefixname" . }}-brokerv2
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gams-engine.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
spec:
  selector:
    app: {{ include "gams-engine.prefixname" . }}-brokerv2
  ports:
  - port: {{ .Values.broker.apiVersion2.service.port }}
    targetPort: 5000
    {{- if and (eq .Values.broker.apiVersion2.service.type "NodePort") .Values.broker.apiVersion2.service.nodePort }}
    nodePort: {{ .Values.broker.apiVersion2.service.nodePort }}
    {{- end }}
  type: {{ required "value 'broker.apiVersion2.service.type' is required" .Values.broker.apiVersion2.service.type }}
